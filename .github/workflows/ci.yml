name: CI

on:
  push:
  pull_request:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/balloon-sim

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:latest -f tools/Dockerfile .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:latest

  lint:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Docker image
        run: docker pull $IMAGE_NAME:latest

      - name: Run ruff inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/balloon-simulation \
            $IMAGE_NAME:latest \
            bash -c "ruff check /balloon-simulation"

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Docker image
        run: docker pull $IMAGE_NAME:latest

      - name: Run pytest with coverage
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/balloon-simulation \
            $IMAGE_NAME:latest \
            bash -c "pytest tests --cov=src --cov-report=term --cov-report=xml"

  deploy-pages:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages   # ← これ追加

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Convert Markdown to HTML
        run: |
          pandoc docs/report.md \
            -o docs/report.html \
            --standalone \
            --metadata title="Simulation Learning  Report" \
            --toc

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4